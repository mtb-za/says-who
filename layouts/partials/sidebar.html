{{ $currentSection := .Section -}}
{{ $currentID := "" -}}
{{ with .File }}{{ $currentID = .UniqueID }}{{ end -}}
<aside class="sidebar layout__second-sidebar">

<div class="webring webring--card" aria-label="Webring">
  <div class="title"><a href="https://rootr.ing/">rootring</a>, a TTRPG webring</div>
  <div class="links">
    <a href="https://rootr.ing/prev?site=https://mtb-za.github.io/says-who/">Prev</a>
    <a href="https://rootr.ing/random">Random</a>
    <a href="https://rootr.ing/directory">Ring</a>
    <a href="https://rootr.ing/next?site=https://mtb-za.github.io/says-who/">Next</a>
  </div>
</div>

<style>
  .webring--card {
    margin-top: .5rem;
    display: inline-block;
    padding: .75rem .85rem .7rem;
    border: 1px solid color-mix(in srgb, currentColor 28%, transparent);
    border-radius: .35rem;
    background: color-mix(in srgb, currentColor 5%, transparent);
    min-width: 18rem;
  }
  .webring--card .title {
    font-weight: 700;
    margin-bottom: .45rem;
    padding-bottom: .35rem;
    border-bottom: 1px dashed color-mix(in srgb, currentColor 22%, transparent);
    letter-spacing: .03em;
    text-transform: lowercase;
    font-size: .88rem;
  }
  .webring--card .links {
    display: flex;
    gap: .8rem;
    flex-wrap: wrap;
  }
  .webring--card a {
    text-decoration: none;
    border-bottom: 1px solid color-mix(in srgb, currentColor 45%, transparent);
  }
  .webring--card a:hover { border-bottom-color: currentColor; }
</style>
{{ range site.Sections -}}
<section class="menu">

<p class="title"><strong><a href="{{ .RelPermalink }}"{{ if eq $currentSection .Section }} aria-current="page"{{ end }}>{{ .Title }}</a></strong></p>
<ul>
{{ range .Pages -}}
<li><a href="{{ .RelPermalink }}"{{ if eq $currentID .File.UniqueID }} aria-current="page"{{ end }}>{{ .Title }}</a></li>
{{ end -}}


</ul>
</section>
{{ end -}}
</aside>
